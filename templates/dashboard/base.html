{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Store Admin{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <script>
      // Pre-paint: set theme before first render to avoid a flash (FOUC).
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
</head>
<body class="admin">
    <div class="admin-topbar">
        <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu" aria-controls="admin-sidebar">
            <span></span><span></span><span></span>
        </button>
        <span class="brand">Store Admin</span>
    </div>

    <div class="admin-layout">
        <nav class="admin-sidebar" id="admin-sidebar">
            <div class="brand">Store Admin</div>
            <a href="{% url 'dashboard_home' %}">Overview</a>
            <a href="{% url 'dashboard_inventory' %}">Inventory</a>
            <a href="{% url 'dashboard_reports' %}">Sales reports</a>
            <a href="/admin/">Django admin</a>
            <a href="{% url 'index' %}">View store</a>
            <a href="{% url 'logout' %}">Logout</a>
            <div class="sidebar-foot">
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode">☾</button>
            </div>
        </nav>
        <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

        <main class="admin-content">
            {% if messages %}
            <ul class="messages">
                {% for message in messages %}<li>{{ message }}</li>{% endfor %}
            </ul>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="{% static 'js/theme.js' %}"></script>
</body>
</html>
