{% extends 'dashboard/base.html' %}
{% block title %}Delete product - Store Admin{% endblock %}
{% block content %}
<h1>Delete product</h1>
<p>Are you sure you want to delete <strong>{{ product.title }}</strong>? This cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn danger">Yes, delete</button>
    <a class="btn secondary" href="{% url 'dashboard_inventory' %}">Cancel</a>
</form>
{% endblock %}
